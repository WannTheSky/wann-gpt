<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wann-GPT | Modern AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Inter', sans-serif;
            height: auto;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* LOADING SCREEN */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0f1a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        .loading-screen.hide { opacity: 0; pointer-events: none; }
        .loading-logo { font-size: 3rem; color: #00f2ff; text-shadow: 0 0 20px #00f2ff; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .loading-text { font-size: 1.5rem; letter-spacing: 2px; color: #0a3350; font-weight: bold; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid #0a3350; border-top-color: #00f2ff; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0f172a;
            border: 1px solid #00f2ff;
            border-radius: 50px;
            padding: 12px 24px;
            color: #00f2ff;
            font-weight: bold;
            z-index: 3000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 20px rgba(0,242,255,0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-progress { width: 80px; height: 3px; background: rgba(0,242,255,0.3); border-radius: 3px; overflow: hidden; }
        .toast-progress-fill { height: 100%; width: 100%; background: #00f2ff; animation: shrink 3s linear forwards; }
        @keyframes shrink { from { width: 100%; } to { width: 0%; } }

        /* WAITING MESSAGE ANIMATION */
        .waiting-message {
            animation: fadeInUp 0.3s ease;
        }
        .waiting-message.remove {
            animation: fadeOutDown 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOutDown {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(30px); }
        }

        /* GENERATING ANIMATION */
        .generating-pulse {
            animation: genPulse 1s infinite;
        }
        @keyframes genPulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        body.dark {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-sidebar: #0f1722;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --neon-blue: #00f2ff;
            --neon-glow: 0 0 6px #00f2ff, 0 0 12px #00f2ff80;
            --border-glow: 1px solid #00f2ff40;
            --user-bubble: #1e293b;
            --ai-bubble: #0f172a;
            --input-bg: #0f172a;
            --scrollbar: #00f2ff40;
            --overlay-bg: rgba(0,0,0,0.9);
        }
        body.light {
            --bg-primary: #d9eaff;
            --bg-secondary: #c2e0ff;
            --bg-sidebar: #b0d4ff;
            --text-primary: #022b3b;
            --text-secondary: #035c7c;
            --neon-blue: #0066cc;
            --neon-glow: 0 0 5px #0066cc, 0 0 10px #3399ff;
            --border-glow: 1px solid #0066cc;
            --user-bubble: #cce5ff;
            --ai-bubble: #deedff;
            --input-bg: #ffffffcc;
            --scrollbar: #0066cc;
            --overlay-bg: rgba(0,0,0,0.9);
        }
        body { background: var(--bg-primary); color: var(--text-primary); transition: 0.2s; }

        .app { display: flex; min-height: 100vh; width: 100%; position: relative; }
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--bg-sidebar); border-right: var(--border-glow);
            backdrop-filter: blur(12px); z-index: 1000; transition: left 0.3s;
            display: flex; flex-direction: column; padding: 1.5rem 1rem; gap: 1rem;
            overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg); backdrop-filter: blur(3px);
            z-index: 999; display: none;
        }
        .sidebar-overlay.active { display: block; }

        .hamburger {
            position: fixed; top: 18px; left: 20px; z-index: 1001;
            background: var(--neon-blue); border: none; width: 48px; height: 48px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center;
            justify-content: center;
        }
        .hamburger i { font-size: 24px; color: #011627; }

        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); width: 100%; min-height: 100vh; }
        .chat-header {
            padding: 1rem 2rem 1rem 80px; border-bottom: var(--border-glow);
            background: var(--bg-secondary); position: sticky; top: 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .chat-header h1 { font-size: 1.8rem; text-shadow: var(--neon-glow); color: var(--neon-blue); }
        .new-chat-btn { background: var(--neon-blue); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: #011627; }
        .mode-badge, .api-status-badge { font-size: 0.7rem; background: var(--bg-primary); padding: 4px 10px; border-radius: 40px; display: inline-block; }

        .messages { flex: 1; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1rem; padding-bottom: 160px; max-height: calc(100vh - 200px); overflow-y: auto; }
        .message { display: flex; gap: 12px; max-width: 85%; animation: fadeSlideUp 0.2s; }
        .user-message { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 18px; border-radius: 24px; background: var(--user-bubble); border: var(--border-glow); white-space: pre-wrap; }
        .ai-message .bubble { background: var(--ai-bubble); border-left: 3px solid var(--neon-blue); }
        .chat-image, .chat-video-thumb { max-width: 200px; max-height: 150px; border-radius: 12px; margin-top: 8px; cursor: pointer; border: var(--border-glow); }
        .generated-image { max-width: 250px; border-radius: 16px; margin-top: 10px; cursor: pointer; border: 2px solid var(--neon-blue); }
        .video-play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: white; }
        .video-duration-badge { position: absolute; bottom: 12px; right: 8px; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 8px; font-size: 11px; }

        .code-block-wrapper { position: relative; margin: 8px 0; }
        .code-block-wrapper pre { background: var(--bg-primary); padding: 12px; border-radius: 12px; overflow-x: auto; border: var(--border-glow); }
        .copy-code-btn { position: absolute; top: 8px; right: 8px; background: var(--neon-blue); border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; color: #011627; }

        .input-area { padding: 1rem 2rem; background: var(--bg-secondary); border-top: var(--border-glow); display: flex; flex-direction: column; gap: 10px; position: sticky; bottom: 0; z-index: 10; }
        .input-row { display: flex; gap: 12px; align-items: flex-end; }
        .attach-btn { background: white !important; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex !important; align-items: center !important; justify-content: center !important; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .attach-btn i { color: black !important; font-size: 1.5rem; }
        .message-input { flex: 1; background: var(--input-bg); border: var(--border-glow); border-radius: 24px; color: var(--text-primary); outline: none; font-size: 1rem; font-family: inherit; padding: 12px 18px; resize: none; overflow-y: auto; max-height: calc(1.5em * 5 + 24px); min-height: 48px; }
        #sendBtn { background: var(--neon-blue); border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; color: #011627; height: 48px; }
        
        .attachments-preview { display: flex; flex-wrap: wrap; gap: 10px; padding: 5px 0; }
        .preview-item { position: relative; background: var(--bg-primary); border-radius: 12px; padding: 5px; border: var(--border-glow); }
        .preview-item img, .preview-item video { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .remove-preview { position: absolute; top: -8px; right: -8px; background: #ff4444; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }

        .options-menu { position: absolute; bottom: 80px; left: 20px; background: var(--bg-sidebar); border: var(--border-glow); border-radius: 20px; padding: 8px; display: none; flex-direction: column; gap: 5px; z-index: 100; min-width: 180px; }
        .options-menu.show { display: flex; }
        .options-menu button { background: var(--bg-primary); border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; text-align: left; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; color: white !important; }

        .toggle-btn { background: var(--bg-primary); border: var(--border-glow); padding: 10px; border-radius: 30px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .api-section { background: var(--bg-primary); border-radius: 16px; padding: 12px; border: var(--border-glow); }
        .menu-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 8px; }
        .btn-check, .login-btn, .logout-btn { background: var(--neon-blue); border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 8px; font-weight: bold; color: #011627; }
        
        .history-item { background: var(--bg-primary); border: var(--border-glow); border-radius: 12px; padding: 8px 12px; margin-bottom: 8px; cursor: pointer; font-size: 0.75rem; }
        .history-item:hover { transform: scale(1.02); box-shadow: var(--neon-glow); }
        .delete-history-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .delete-all-btn, .select-delete-btn { background: var(--neon-blue); border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; font-weight: bold; color: #011627; flex: 1; }
        .delete-all-btn { background: #ff4444; color: white; }

        .user-info { display: flex; align-items: center; gap: 10px; padding: 8px; background: var(--bg-primary); border-radius: 40px; margin-bottom: 8px; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; }
        
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }
        @media (max-width: 768px) { .chat-header { padding-left: 70px; } .message { max-width: 95%; } }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-controls { position: absolute; top: 20px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; z-index: 2001; }
        .modal-btn { background: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; color: black; display: flex; align-items: center; gap: 8px; }
        .video-controls-bar { position: absolute; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.7); border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .video-progress { flex: 1; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; cursor: pointer; }
        .video-progress-fill { height: 100%; background: #00f2ff; border-radius: 5px; width: 0%; }
        .video-current-time, .video-duration { color: white; font-size: 14px; min-width: 60px; }
        .modal-video { max-width: 100%; max-height: 70vh; }
        
        .toxic-mode {
            border-left-color: #ff4444 !important;
        }
    </style>
</head>

        // ==================== API CONFIG ====================
        const WANN_API_KEY = "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";
        const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
        const MODEL = "deepseek-v4-flash";
        
        // ==================== SAVE COUNTER ====================
        const SAVE_COUNTER_KEY_JPG = "wann_gpt_save_counter_jpg";
        const SAVE_COUNTER_KEY_MP4 = "wann_gpt_save_counter_mp4";
        
        // ==================== LOADING SCREEN ====================
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('hide');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.getElementById('app').style.display = 'flex';

        // ==================== TOAST ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.innerHTML = message;
            toast.classList.add('show');
            const progressFill = toast.querySelector('.toast-progress-fill');
            progressFill.style.animation = 'none';
            setTimeout(() => { progressFill.style.animation = 'shrink 3s linear forwards'; }, 10);
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }
        
        // ==================== SAVE FILE ====================
        async function getNextFileNumber(extension) {
            const key = extension === 'jpg' ? SAVE_COUNTER_KEY_JPG : SAVE_COUNTER_KEY_MP4;
            let lastNumber = parseInt(localStorage.getItem(key) || '0');
            const nextNumber = lastNumber + 1;
            localStorage.setItem(key, nextNumber.toString());
            return nextNumber;
        }
        
        async function saveFileToDownloads(dataUrl, extension) {
            try {
                const fileNumber = await getNextFileNumber(extension);
                const filename = `Wann-GPT ${fileNumber}.${extension}`;
                const response = await fetch(dataUrl);
                const blob = await response.blob();
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast(`✅ File tersimpan: ${filename} di folder Downloads/Wann-GPT/`);
                return true;
            } catch(e) {
                showToast(`❌ Gagal menyimpan: ${e.message}`);
                return false;
            }
        }

                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#0a0f1a';
                ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = '#00f2ff';
                ctx.font = 'bold 20px Arial';
                ctx.fillText(`🎨 Gambar: "${prompt.substring(0, 30)}"`, 50, 250);
                ctx.font = '14px Arial';
                ctx.fillStyle = '#ffffff';
                ctx.fillText('Generated by Wann-GPT AI', 150, 400);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                resolve(dataUrl);
            });
        }

            while((m=regex.exec(text))!==null){
                res+=text.substring(last,m.index);
                res+=`<div class="code-block-wrapper"><button class="copy-code-btn" onclick="copyCodeToClipboard(this)"><i class="fas fa-copy"></i> Salin</button><pre><code>${escapeHtml(m[2])}</code></pre></div>`;
                last=m.index+m[0].length;
            }
            res+=text.substring(last);
            return res.replace(/\n/g, '<br>');
        }

        // ==================== FILE READER ====================
        async function readTextFile(arrayBuffer, filename) {
            const decoder = new TextDecoder('utf-8');
            let text = decoder.decode(arrayBuffer);
            if(text.length > 5000) text = text.substring(0, 5000) + "\n\n... [TEKS DIPOTONG]";
            return { name: filename, content: text, type: 'text' };
        }
        
        async function readPDFFile(arrayBuffer, filename) {
            try {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';
                for(let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    fullText += textContent.items.map(item => item.str).join(' ');
                }
                if(fullText.length > 5000) fullText = fullText.substring(0, 5000);
                return { name: filename, content: fullText || "[PDF tidak memiliki teks]", type: 'pdf' };
            } catch(e) {
                return { name: filename, content: `[GAGAL MEMBACA PDF: ${e.message}]`, type: 'error' };
            }
        }
        
        async function extractFileContent(fileData) {
            const filename = fileData.name;
            const extension = filename.split('.').pop().toLowerCase();
            if(fileData.type && fileData.type.startsWith('image/')) return { name: filename, content: null, type: 'image', dataUrl: fileData.data };
            if(fileData.type && fileData.type.startsWith('video/')) return { name: filename, content: null, type: 'video', dataUrl: fileData.data };
            const binaryString = atob(fileData.data.split(',')[1]);
            const bytes = new Uint8Array(binaryString.length);
            for(let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const arrayBuffer = bytes.buffer;
            const textExtensions = ['txt', 'js', 'html', 'css', 'py', 'json', 'xml', 'csv', 'md', 'sql'];
            if(textExtensions.includes(extension)) return await readTextFile(arrayBuffer, filename);
            if(extension === 'pdf') return await readPDFFile(arrayBuffer, filename);
            try { return await readTextFile(arrayBuffer, filename); }
            catch(e) { return { name: filename, content: `[FILE: ${filename}] - Tidak bisa membaca`, type: 'unknown' }; }
        }

            const waitingMsgDiv = document.createElement('div');
            waitingMsgDiv.className = 'message ai-message waiting-message';
            waitingMsgDiv.innerHTML = `<div class="bubble generating-pulse">⏳ Mohon tunggu sebentar, sedang memproses... ⌛</div>`;
            document.getElementById('messagesContainer').appendChild(waitingMsgDiv);
            document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
            
            setTimeout(async () => {
                waitingMsgDiv.classList.add('remove');
                setTimeout(async () => {
                    waitingMsgDiv.remove();
                    let reply = "";
                    try {
                        if(isApiValid) reply = await callWannAPI(text || "Analisis file", filesToSend);
                        else reply = "[Local Mode] API Key belum valid. Cek koneksi.";
                    } catch(e){ reply = `Error: ${e.message}`; }
                    addMessage("ai", reply, false);
                }, 500);
            }, 5000);
        }
        
        function handleFiles(files) {
            for(let file of files){
                const reader = new FileReader();
                reader.onload = function(ev) {
                    pendingFiles.push({ name: file.name, type: file.type, data: ev.target.result });
                    updatePreviewPanel();
                };
                reader.readAsDataURL(file);
            }
        }
        
        function updatePreviewPanel() {
            const container = document.getElementById('attachmentsPreview');
            container.innerHTML = '';
            pendingFiles.forEach((f, idx) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                if(f.type && f.type.startsWith('image/')) {
                    div.innerHTML = `<img src="${f.data}" style="width:60px;height:60px;object-fit:cover;"><button class="remove-preview" data-index="${idx}">×</button>`;
                } else if(f.type && f.type.startsWith('video/')) {
                    div.innerHTML = `<video src="${f.data}" style="width:60px;height:60px;object-fit:cover;"></video><button class="remove-preview" data-index="${idx}">×</button>`;
                } else {
                    div.innerHTML = `<div class="file-icon"><i class="fas fa-file"></i> ${f.name.substring(0,10)}</div><button class="remove-preview" data-index="${idx}">×</button>`;
                }
                container.appendChild(div);
            });
            document.querySelectorAll('.remove-preview').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.index);
                    pendingFiles.splice(idx,1);
                    updatePreviewPanel();
                });
            });
        }
        
        // ==================== EVENT LISTENERS ====================
        const optionsMenu = document.getElementById('optionsMenu');
        const attachBtn = document.getElementById('attachBtn');
        const galleryInput = document.getElementById('galleryInput');
        const cameraInput = document.getElementById('cameraInput');
        const videoInput = document.getElementById('videoInput');
        const documentInput = document.getElementById('documentInput');
        const userTextarea = document.getElementById('userInput');
        
        attachBtn.addEventListener('click', (e) => { e.stopPropagation(); optionsMenu.classList.toggle('show'); });
        document.getElementById('galleryOption').onclick = () => { galleryInput.click(); optionsMenu.classList.remove('show'); };
        document.getElementById('cameraOption').onclick = () => { cameraInput.click(); optionsMenu.classList.remove('show'); };
        document.getElementById('videoOption').onclick = () => { videoInput.click(); optionsMenu.classList.remove('show'); };
        document.getElementById('documentOption').onclick = () => { documentInput.click(); optionsMenu.classList.remove('show'); };
        
        galleryInput.onchange = (e) => { if(e.target.files.length) handleFiles(Array.from(e.target.files)); galleryInput.value = ''; };
        cameraInput.onchange = (e) => { if(e.target.files.length) handleFiles(Array.from(e.target.files)); cameraInput.value = ''; };
        videoInput.onchange = (e) => { if(e.target.files.length) handleFiles(Array.from(e.target.files)); videoInput.value = ''; };
        documentInput.onchange = (e) => { if(e.target.files.length) handleFiles(Array.from(e.target.files)); documentInput.value = ''; };
        document.addEventListener('click', () => { optionsMenu.classList.remove('show'); });
        
        function autoExpandTextarea() {
            const textarea = document.getElementById('userInput');
            if(!textarea) return;
            textarea.style.height = 'auto';
            const maxHeight = 48 + (24 * 4);
            textarea.style.height = Math.min(textarea.scrollHeight, maxHeight) + 'px';
        }
        
        userTextarea.addEventListener('input', autoExpandTextarea);
        userTextarea.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        
        document.getElementById('modalBackBtn').addEventListener('click', () => {
            document.getElementById('mediaModal').classList.remove('show');
        });
        
        document.getElementById('deleteAllHistoryBtn').onclick = () => { if(confirm("Hapus SEMUA riwayat chat?")) deleteAllHistory(); };
        document.getElementById('selectDeleteBtn').onclick = () => enterDeleteMode();
        document.getElementById('cancelDeleteBtn').onclick = () => exitDeleteMode();
        document.getElementById('confirmDeleteBtn').onclick = () => deleteSelectedChats();
        
        function toggleSidebar(open){ 
            document.getElementById('sidebar').classList.toggle('open',open); 
            document.getElementById('sidebarOverlay').classList.toggle('active',open); 
        }
        
        function setTheme(t){ 
            document.body.className=t; 
            document.getElementById("themeStatus").innerText=t==="dark"?"GELAP":"TERANG"; 
            currentTheme=t; 
            toggleSidebar(false); 
        }
        
        function setAIMode(m){ 
            aiMode=m; 
            document.getElementById("aiModeStatus").innerText=m.toUpperCase(); 
            document.getElementById("modeBadge").innerHTML=m==='save'?'<i class="fas fa-shield-alt"></i> SAVE':'<i class="fas fa-skull-crossbones"></i> DANGER';
            const modeMessage = m==='danger' ? '🔥 MODE DANGER AKTIF!' : '🛡️ MODE SAVE AKTIF!';
            addMessage("ai", modeMessage, false);
            toggleSidebar(false); 
        }
        
        document.getElementById("checkApiBtn").onclick = verifyApiKey;
        document.getElementById("themeToggleBtn").onclick = () => setTheme(currentTheme==="dark"?"light":"dark");
        document.getElementById("aiModeToggleBtn").onclick = () => setAIMode(aiMode==="save"?"danger":"save");
        document.getElementById("sendBtn").onclick = sendMessage;
        document.getElementById('hamburgerBtn').onclick = () => toggleSidebar(true);
        document.getElementById('sidebarOverlay').onclick = () => toggleSidebar(false);
        document.getElementById('loginBtn').onclick = () => alert("Login Google (klik ok)");
        document.getElementById('logoutBtn').onclick = () => alert("Logout (yakin?)");
        document.getElementById('newChatBtn').onclick = () => createNewChat();
        
        // ==================== INIT ====================
        setTheme("dark");
        setAIMode("save");
        verifyApiKey();
        loadChatList();
        const lastChatId = localStorage.getItem(CURRENT_CHAT_KEY);
        if(lastChatId && JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')[lastChatId]) loadChat(lastChatId);
        else createNewChat();
        autoExpandTextarea();
    </script>
</body>
</html>
